# Coturn TURN Server Configuration

# Listener port for UDP and TCP
listening-port=3478

# External IP (Important! Use the public IP of your server)
# In Docker, we can often rely on the mapped ports, but specifying external-ip is safer for NAT
# Since we don't know the IP attending to build time, we might need to rely on auto-detection or environemnt variables.
# For this basic setup, we'll try to rely on relay-ip which can be discovered.
# However, Coturn often needs 'external-ip=PUBLIC_IP' to work correctly behind NAT.
# We will use the 'external-ip' option if possible via command line arguments in docker-compose.

realm=psicoaissist.com
server-name=psicoaissist-turn

# Authentication
# We will use the 'Long-Term Credential Mechanism'
use-auth-secret
static-auth-secret=replace_this_with_a_secure_secret_in_production_env

# Relay ports
min-port=49152
max-port=65535

# Log to stdout
log-file=stdout
simple-log

# Enable verbose logging for debugging (optional)
# verbose

# Allow loopback (for local testing)
allow-loopback-peers
cli-password=qwerty

# Security
no-tlsv1
no-tlsv1_1
