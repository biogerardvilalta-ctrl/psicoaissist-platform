# Coturn TURN Server Configuration

# Listener port for UDP and TCP
listening-port=3478
# Listen on all interfaces (required for Docker)
listening-ip=0.0.0.0

# External IP and Relay IP - Set via command line in docker-compose.yml using ${EXTERNAL_IP} from .env
# This is critical for NAT traversal between private networks
# The relay-ip parameter tells Coturn which IP to advertise to clients for media relay
# Development: Use your local IP (e.g., 192.168.1.X)
# Production: Use server public IP (188.245.35.99)
# Both external-ip and relay-ip are set via --external-ip and --relay-ip command line parameters

realm=psicoaissist.com
server-name=psicoaissist-turn

# Authentication
# We will use the 'Long-Term Credential Mechanism'
use-auth-secret
static-auth-secret=replace_this_with_a_secure_secret_in_production_env

# Relay ports - Full range for maximum compatibility
min-port=49152
max-port=65535

# Log to stdout
log-file=stdout
simple-log

# Enable verbose logging for debugging (optional)
# verbose

# Allow loopback (for local testing)
allow-loopback-peers
cli-password=qwerty

# Security
no-tlsv1
no-tlsv1_1
