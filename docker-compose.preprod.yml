services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: psicoaissist_preprod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_preprod_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5433:5432" # Puerto diferente para coexistir si hace falta

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: psicoaissist_preprod_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    volumes:
      - redis_preprod_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:6380:6379"

  # TURN Server (Coturn)
  coturn:
    image: coturn/coturn
    container_name: psicoaissist_preprod_coturn
    restart: unless-stopped
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf
    environment:
      - TURN_SECRET=${TURN_SECRET}
      - REALM=${TURN_REALM}
      - EXTERNAL_IP=${EXTERNAL_IP}
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --static-auth-secret=${TURN_SECRET}
      - --realm=${TURN_REALM}
      - --external-ip=${EXTERNAL_IP}
      - --relay-ip=${EXTERNAL_IP}

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psicoaissist_preprod_backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.preprod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5433/${POSTGRES_DB}
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380
      PORT: 3002 # Puerto distinto de prod (3001)

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    container_name: psicoaissist_preprod_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env.preprod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: http://host.docker.internal:3002/api/v1
    ports:
      - "3003:3000" # Frontend accesible en el 3003

volumes:
  postgres_preprod_data:
  redis_preprod_data:
