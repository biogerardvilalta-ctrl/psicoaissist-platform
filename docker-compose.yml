services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: psicoaissist_beta_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_beta_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: psicoaissist_beta_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    volumes:
      - redis_beta_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379" # Expose to Localhost Only

  # TURN Server (Coturn)
  coturn:
    image: coturn/coturn
    container_name: psicoaissist_beta_coturn
    restart: unless-stopped
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf
    environment:
      - TURN_SECRET=${TURN_SECRET}
      - REALM=${TURN_REALM}
      - EXTERNAL_IP=${EXTERNAL_IP}
      # IMPORTANT: Coturn needs to know its external IP for NAT traversal
      # This is the public IPv4 address of the server
    network_mode: host # USE HOST IP (REQUIRED FOR UFW + COTURN)
    depends_on:
      redis:
        condition: service_healthy
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --static-auth-secret=${TURN_SECRET}
      - --realm=${TURN_REALM}
      - --external-ip=${EXTERNAL_IP}
      - --relay-ip=${EXTERNAL_IP}

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psicoaissist_beta_backend
    restart: unless-stopped
    network_mode: host # USE HOST IP (IPv6 enabled) to bypass Google Block
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Connect to services via Localhost (since we are on Host Network)
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      PORT: 3001 # Listen directly on 3001 to avoid conflict with Frontend (3000)
    # Ports mapping removed because network_mode: host invalidates it

    # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    container_name: psicoaissist_beta_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to Host IP
    environment:
      # Browser -> API (External URL)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Server Side Rendering -> API (Internal Host URL)
      INTERNAL_API_URL: http://host.docker.internal:3001/api/v1
    ports:
      - "3000:3000" # Frontend accessible at port 3000 on Host

volumes:
  postgres_beta_data:
  redis_beta_data:
