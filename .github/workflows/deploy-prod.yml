name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST_PROD }}
          username: ${{ secrets.SERVER_USER_PROD }}
          key: ${{ secrets.SERVER_SSH_KEY_PROD }}
          port: ${{ secrets.SERVER_PORT_PROD || '22' }}
          script: |
            cd ${{ secrets.SERVER_PATH_PROD || '~/psicoaissist-platform' }}
            
            # Check if this is a tag build
            if [[ $GITHUB_REF == refs/tags/* ]]; then
              # Extract tag name
              TAG_NAME=${GITHUB_REF#refs/tags/}
              git fetch --tags
              git checkout $TAG_NAME
            else
              # Regular branch build
              git checkout ${GITHUB_REF#refs/heads/}
              git pull origin ${GITHUB_REF#refs/heads/}
            fi
            
            # Crear/Actualizar el archivo .env.prod con los secrets
            cat << 'EOF' > .env.prod
            NODE_ENV=production
            POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.PROD_JWT_REFRESH_SECRET }}
            ENCRYPTION_KEY="${{ secrets.PROD_ENCRYPTION_KEY }}"
            STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.PROD_STRIPE_WEBHOOK_SECRET }}
            STRIPE_CURRENCY=${{ secrets.PROD_STRIPE_CURRENCY || 'eur' }}
            SMTP_HOST=${{ secrets.PROD_SMTP_HOST }}
            SMTP_PORT=${{ secrets.PROD_SMTP_PORT }}
            SMTP_USER=${{ secrets.PROD_SMTP_USER }}
            SMTP_PASS=${{ secrets.PROD_SMTP_PASS }}
            SMTP_FROM=${{ secrets.PROD_SMTP_FROM }}
            GOOGLE_API_KEY=${{ secrets.PROD_GOOGLE_API_KEY }}
            OPENAI_API_KEY=${{ secrets.PROD_OPENAI_API_KEY }}
            GEMINI_API_KEY=${{ secrets.PROD_GEMINI_API_KEY }}
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.PROD_NEXT_PUBLIC_SOCKET_URL }}
            FRONTEND_URL=${{ secrets.PROD_FRONTEND_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.PROD_GOOGLE_REDIRECT_URI }}
            TURN_SECRET=${{ secrets.PROD_TURN_SECRET }}
            TURN_REALM=${{ secrets.PROD_TURN_REALM }}
            EXTERNAL_IP=${{ secrets.PROD_EXTERNAL_IP }}
            EOF
            
            chmod 600 .env.prod
            chmod +x deploy.sh
            ./deploy.sh prod
